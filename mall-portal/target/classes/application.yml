spring:
  application:
    name: mall-portal
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/global_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:8}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  cloud:
    loadbalancer:
      enabled: true
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

server:
  port: 8207

sa-token:
  token-name: satoken
  jwt-secret-key: globalMall-shared-jwt-secret-for-dev-DO-NOT-USE-in-prod-32b
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  token-prefix: Bearer
  is-log: true
  is-read-header: true
  is-read-body: false

secure:
  ignore:
    urls: []

security:
  internal:
    enabled: false
    token-value: ${SECURITY_INTERNAL_TOKEN:}

snowflake:
  worker-id: 1
  datacenter-id: 1
