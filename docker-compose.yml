# Local infrastructure for globalMall (run Java services on the host against these ports).
# Defaults match application.yml: MySQL global_mall / root:123456, Redis, Nacos, RabbitMQ, Elasticsearch.

services:
  mysql:
    image: mysql:8.0
    container_name: globalmall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: global_mall
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - globalmall-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: globalmall-redis
    ports:
      - "6379:6379"

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: globalmall-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "globalMall-shared-jwt-secret-for-dev-DO-NOT-USE-in-prod-32b"
      NACOS_AUTH_USERNAME: "nacos"
      NACOS_AUTH_PASSWORD: "nacos"
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - globalmall-nacos-data:/home/nacos/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: globalmall-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: globalmall-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - globalmall-es-data:/usr/share/elasticsearch/data

volumes:
  globalmall-mysql-data:
  globalmall-nacos-data:
  globalmall-es-data:
